services:
  - type: web
    name: dunwell-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        sync: false          # paste your Neon connection string in the Render dashboard
      - key: SESSION_SECRET
        sync: false          # paste your session secret in the Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false          # paste your Vercel frontend URL, e.g. https://dunwell.vercel.app
